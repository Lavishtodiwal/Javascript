<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API request using ajax</title>
</head>

<body>

    <script>
        const url = "https://api.github.com/users/Lavishtodiwal"
        const xhr = new XMLHttpRequest();
        xhr.open('GET', url)
        xhr.onreadystatechange = function () {
            console.log(xhr.readyState);
            if (xhr.readyState === 4) {
                const data = JSON.parse(this.responseText) //default return is String and we parse it to the JSON
                console.log(typeof data)
                console.log(data.followers)
            }

        }
        xhr.send();
    </script>
</body>

</html>
